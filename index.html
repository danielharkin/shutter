<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <div id="dropzone" style="display:none; position:fixed; inset:0; background:rgba(0,122,255,0.9); z-index:100000; align-items:center; justify-content:center; flex-direction:column; color:white; pointer-events:none;">
    <div style="font-size:60px; margin-bottom:20px;">📦</div>
    <h2 style="font-weight:900;">Drop .photoslib here to load</h2>
</div>

    <div id="top-safe"></div>
    
<div id="sidebar">

    <!-- ── LIBRARY HEADER ── -->
    <div class="sidebar-header-row">
        <span class="sidebar-section-title">LIBRARY</span>
        <div class="sidebar-header-actions">
            <button id="btn-create-library" class="icon-btn" title="Create New Library">+</button>
            <button id="btn-add-library"    class="icon-btn" title="Open Library">&#128193;</button>
        </div>
    </div>

    <!-- ── ACTIVE LIBRARY CARD ── -->
    <div id="library-card" class="library-card" style="display:none">
        <!-- Name row: click name to toggle recent-library dropdown, click dots to toggle phases -->
        <div class="library-card-row">
            <span id="library-card-name" class="library-card-name" id="library-name-toggle" title="Switch library"></span>
            <div id="library-traffic-lights" class="traffic-lights" style="cursor:pointer" title="Show indexing phases">
                <span class="tl-dot" id="tl-structure" title="File structure"></span>
                <span class="tl-dot" id="tl-metadata"  title="Location & date metadata"></span>
                <span class="tl-dot" id="tl-live"      title="Live photo pairing"></span>
                <span class="tl-dot" id="tl-types"     title="Type classification"></span>
            </div>
        </div>
        <!-- Recent libraries dropdown -->
        <div id="library-dropdown" class="library-dropdown" style="display:none"></div>
        <!-- Indexing phase detail -->
        <div id="library-phase-detail" class="library-phase-detail" style="display:none">
            <div class="phase-row" id="prow-structure">
                <span class="phase-row-label">File Structure</span>
                <span class="phase-row-status" id="pstat-structure"></span>
            </div>
            <div class="phase-row" id="prow-metadata">
                <span class="phase-row-label">Location &amp; Dates</span>
                <span class="phase-row-status" id="pstat-metadata"></span>
            </div>
            <div class="phase-row" id="prow-live">
                <span class="phase-row-label">Live Photos</span>
                <span class="phase-row-status" id="pstat-live"></span>
            </div>
            <div class="phase-row" id="prow-types">
                <span class="phase-row-label">Type Classification</span>
                <span class="phase-row-status" id="pstat-types"></span>
            </div>
            <button id="btn-rebuild-library" class="rebuild-btn">↺ Rebuild Index</button>
        </div>
    </div>

    <!-- ── NO LIBRARY PLACEHOLDER ── -->
    <div id="library-empty" class="library-empty">No library loaded</div>

    <!-- ── VIEW ALL ── -->
    <button id="btn-view-all" class="nav-item active" style="margin-top:8px">
        <span>View All</span><span id="view-all-count">—</span>
    </button>

    <!-- ── FOLDERS HEADER + LIST ── -->
    <div class="sidebar-header-row" style="margin-top:8px">
        <span class="sidebar-section-title">FOLDERS</span>
    </div>
    <div id="folder-list"></div>

</div>

    <div id="main">
        <header>
<div id="filter-bar">
    <button class="btn-pill active" data-type="image">Photos</button>
    <button class="btn-pill active" data-type="video">Videos</button>
    <button class="btn-pill active" data-type="live">Live</button>
    <button class="btn-pill active" data-type="shorts">Shorts</button> 
    <button class="btn-pill active" data-type="screenshot">Screenshots</button>
    <button class="btn-pill active" data-type="selfie">Selfies</button>
</div>
            <button class="btn-pill" id="btn-toggle-split">Split Map</button>
        </header>

        <div id="content-wrapper">
            <div id="scroll-container">
                <div id="split-map">
                    <button id="btn-main-sat" class="map-overlay-btn">SAT</button>
                </div>
                <div id="grid"></div>
            </div>
            <div id="timeline-scrubber"></div>
            
            <div id="lightbox">
                <div id="lightbox-close">✕</div>
                <button class="nav-arrow prev">❮</button>
                <button class="nav-arrow next">❯</button>
                <div id="lightbox-target"></div>
            </div>
        </div>
    </div>

    <div id="info-panel">
        <div id="info-ui" style="display:none">
            <div class="section-header">Filename</div>
            <div id="info-filename"></div>
            
            <div id="media-cont" class="media-card"></div>

            <div class="section-header">Photo Location</div>
            <div class="card-map">
                <div id="mini-map"></div>
                <div id="map-crosshair">📍</div>
                <div id="no-loc-overlay" class="no-loc-overlay">NO IMAGE LOCATION</div>
                <button id="btn-mini-sat" class="map-overlay-btn" style="right: 55px;">SAT</button>
                <button id="btn-drag-loc" class="map-overlay-btn">DRAG</button>
            </div>
            
            <div style="position:relative">
                <input id="loc-search" type="search" class="input-dark" placeholder="🔍 Search Place...">
                <div id="search-suggest"></div>
            </div>
            
            <div class="input-grid">
                <input id="ed-lat" class="input-dark" placeholder="Lat">
                <input id="ed-lng" class="input-dark" placeholder="Lng">
            </div>

            <div class="section-header">Photo Date & Time</div>
            <div class="date-grid">
                <input id="d-dd" class="input-dark" placeholder="DD">
                <input id="d-mm" class="input-dark" placeholder="MM">
                <input id="d-yyyy" class="input-dark" placeholder="YYYY">
            </div>
            <div class="date-grid">
                <input id="d-hh" class="input-dark" placeholder="HH">
                <input id="d-min" class="input-dark" placeholder="MIN">
                <input id="d-ss" class="input-dark" placeholder="SS">
            </div>
            
            <button class="btn-action">Update Database</button>

            <div class="section-header">Metadata</div>
            <details id="acc-exif"><summary>EXIF</summary><div id="data-exif"></div></details>
            <details id="acc-iptc"><summary>IPTC</summary><div id="data-iptc"></div></details>
            <details id="acc-quicktime"><summary>QuickTime / Video</summary><div id="data-quicktime"></div></details>
            <details id="acc-xmp"><summary>XMP</summary><div id="data-xmp"></div></details>
            <details id="acc-keywords"><summary>Keywords &amp; Tags</summary><div id="data-keywords"></div></details>
            <details id="acc-file"><summary>File Details</summary><div id="data-file"></div></details>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
